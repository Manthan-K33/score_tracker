<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Score Tracker v4.3</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🏆 Score Tracker</h1>

        <input
            id="playerName"
            type="text"
            placeholder="Enter Your Name"
            onkeydown="handleNameEnter(event)">

        <input
            id="scoreInput"
            type="number"
            value="0"
            min="0"
            placeholder="Enter Your Score"
            onkeydown="handleScoreEnter(event)">

        <div class="button-group">

            <button onclick="saveScore()">
                Save Score
            </button>

            <button onclick="resetData()">
                Reset
            </button>

        </div>

        <h2 id="message"></h2>

        <!-- Stats -->

        <div class="card">
            <h3>🏆 Best Score</h3>
            <p id="bestScore">0</p>
        </div>

        <div class="card">
            <h3>👤 Player</h3>
            <p id="savedPlayer">None</p>
        </div>

        <div class="card">
            <h3>🎮 Games Played</h3>
            <p id="gamesPlayed">0</p>
        </div>

        <div class="card">
            <h3>🔥 Current Streak</h3>
            <p id="streak">0</p>
        </div>

        <div class="card">
            <h3>👑 Highest Rank</h3>
            <p id="highestRank">None</p>
        </div>

        <!-- Progress -->

        <div class="card">

            <h3>📈 Progress To Next Rank</h3>

            <div class="progress-container">

                <div id="progressBar"></div>

            </div>

            <p id="nextRankText">
                Reach 10 points for Beginner
            </p>

        </div>

        <!-- Achievements -->

        <div class="card">

            <h3>🏅 Achievements</h3>

            <ul id="achievementList"></ul>

        </div>

        <!-- Leaderboard -->

        <div class="card">

            <h3>🏆 Top 10 Scores</h3>

            <ol id="leaderboard"></ol>

        </div>

        <!-- History -->

        <div class="card">

            <h3>📜 Score History</h3>

            <ul id="historyList"></ul>

            <button onclick="clearHistory()">
                Clear History
            </button>

        </div>

    </div>

    <!-- Popup Notification -->

    <div id="popup" class="popup">

        Achievement Unlocked!

    </div>

    <script src="script.js"></script>

</body>

</html>

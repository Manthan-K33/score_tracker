<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Score Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🏆 Score Tracker</h1>

        <input
            id="playerName"
            type="text"
            placeholder="Enter Your Name">

        <input
            id="scoreInput"
            type="number"
            placeholder="Enter Your Score">

        <div class="button-group">

            <button onclick="saveScore()">
                Save Score
            </button>

            <button onclick="resetData()">
                Reset
            </button>

        </div>

        <h2 id="message"></h2>

        <div class="card">

            <h3>🏆 Best Score</h3>

            <p id="bestScore">0</p>

        </div>

        <div class="card">

            <h3>👤 Player</h3>

            <p id="savedPlayer">None</p>

        </div>

        <div class="card">

            <h3>📈 Progress To Next Rank</h3>

            <div class="progress-container">

                <div id="progressBar"></div>

            </div>

            <p id="nextRankText">
                Reach 10 points for Beginner
            </p>

        </div>

        <div class="card">

            <h3>🏅 Achievements</h3>

            <ul id="achievementList"></ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>

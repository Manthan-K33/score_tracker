<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Score Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🏆 Score Tracker</h1>

        <input
            id="playerName"
            type="text"
            placeholder="Enter Your Name">

        <input
            id="scoreInput"
            type="number"
            placeholder="Enter Score">

        <div>

            <button onclick="saveScore()">
                Save Score
            </button>

            <button onclick="resetData()">
                Reset
            </button>

        </div>

        <h2 id="message"></h2>

        <div class="card">

            <h3>
                🏆 Best Score:
                <span id="bestScore">0</span>
            </h3>

        </div>

        <div class="card">

            <h3>
                👤 Player:
                <span id="savedPlayer">None</span>
            </h3>

        </div>

        <div class="card">

            <h3>🏅 Achievements</h3>

            <ul id="achievementList"></ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
